<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report a Tip - HanapLink</title>
<link rel="icon" type="image/png" href="/Assets/Logo5.png">
<link rel="stylesheet" href="style/style.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">
    <img src="/Assets/Logo5.png" alt="HanapLink logo" class="brand-logo">
    <div class="brand-text">
      <div><strong>Hanap<span class="link-accent">Link</span></strong></div>
      <div class="brand-tagline">Connecting Communities.<br>Finding Hope.</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="index.html"><span>Home</span></a>
    <a href="feed.html"><span>Feed</span></a>
    <a href="contact.html"><span>Contact</span></a>
    <a href="about.html"><span>About Us</span></a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div class="form-header">
      <div class="icon-circle">💬</div>
      <div>
        <h2>Report a Tip</h2>
        <p>Provide any information that may help locate a missing person.</p>
      </div>
    </div>

    <form id="tipForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name <span style="color:#999;font-weight:400;">(Optional)</span></label>
          <input type="text" id="fullName" placeholder="Enter your Full Name">
        </div>
        <div class="form-group">
          <label>Email Address <span class="req">*</span></label>
          <input type="email" id="email" placeholder="Enter your Email Address" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter your Phone Number">
        </div>
      </div>

      <div class="form-grid" style="grid-template-columns: 1fr; margin-bottom:20px;">
        <div class="form-group">
          <label>Related Missing Person</label>
          <input type="text" id="relatedPerson" placeholder="Enter Name of Related Missing Person">
        </div>
      </div>

      <div class="form-group" style="margin-bottom:20px;">
        <label>Tip / Information <span class="req">*</span></label>
        <textarea id="tipInfo" placeholder="Please provide as much detail as you can" required></textarea>
      </div>

      <div class="notice-row">
        <div class="privacy-note">
          <span class="lock">🔒</span>
          <span>Your information is kept confidential and will only be used to help locate missing persons.</span>
        </div>
        <button type="submit" class="btn" id="submitBtn">✈ Submit</button>
      </div>

      <div id="formMessage"></div>
    </form>
  </div>
</div>

<script type="module" src="js/script.js"></script>
</body>
</html>
